<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Icon: two linked rounded squares -->
  <rect x="4" y="14" width="28" height="28" rx="7" ry="7" fill="none" stroke="url(#grad)" stroke-width="3.5"/>
  <rect x="20" y="18" width="20" height="20" rx="5" ry="5" fill="url(#grad)" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="52" y="38"
    font-family="Inter, system-ui, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#ffffff">Tablelink<tspan fill="#6c63ff">.</tspan></text>
</svg>
